name: Sync to Mirrors

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository == 'segredounlock/recargas-brasil-v2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Preparar para mirror
        run: |
          git config user.name "sync-bot"
          git config user.email "sync@bot.com"
          rm -f .env
          rm -f supabase/config.toml
          # Remover arquivos exclusivos do servidor principal
          rm -f src/components/LicenseManager.tsx
          rm -rf supabase/functions/license-generate/
          rm -f .lovable/plan.md
          rm -f ALTERACOES.md
          rm -f DOCUMENTACAO_MIGRACAO.md
          # Remover documentação de secrets e arquitetura interna
          rm -f documentation/SECRETS.md
          rm -f documentation/MIRROR_SYNC.md
          rm -f documentation/BACKUP.md
          git add -A
          git commit -m "chore: prepare mirror sync (remove env-specific files)" --allow-empty

      - name: Sync mirror
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git remote remove mirror_update || true
          git remote add mirror_update https://x-access-token:${GH_TOKEN}@github.com/segredounlock/sync-start-magic.git
          git push mirror_update HEAD:main --force
